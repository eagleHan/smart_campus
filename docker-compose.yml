version: "3.8"

x-service-base: &service-base
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  environment:
    # 应用环境
    APP_ENV: ${APP_ENV:-docker}
    # PostgreSQL 配置
    POSTGRES_HOST: postgres
    POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    POSTGRES_USER: ${POSTGRES_USER:-smartcampus}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartcampus}
    POSTGRES_DB: ${POSTGRES_DB:-platform_db}
    # Redis 配置
    REDIS_HOST: redis
    REDIS_PORT: ${REDIS_PORT:-6379}
    # RabbitMQ 配置
    RABBITMQ_HOST: rabbitmq
    RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
    RABBITMQ_USER: ${RABBITMQ_USER:-guest}
    RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
  healthcheck:
    test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:${SERVICE_PORT}/health', timeout=5)"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartcampus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartcampus}
      POSTGRES_DB: ${POSTGRES_DB:-platform_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartcampus} -d ${POSTGRES_DB:-platform_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    command: redis-server --appendonly yes

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}

  api-gateway:
    <<: *service-base
    container_name: smartcampus-api-gateway
    environment:
      <<: *service-base
      SERVICE_PORT: 8000
    command: ["python", "-m", "uvicorn", "services.api_gateway.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

  admin-console:
    <<: *service-base
    container_name: smartcampus-admin-console
    environment:
      <<: *service-base
      SERVICE_PORT: 8010
    command: ["python", "-m", "uvicorn", "services.admin_console.app.main:app", "--host", "0.0.0.0", "--port", "8010"]
    ports:
      - "8010:8010"

  identity-access:
