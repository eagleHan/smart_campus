      SERVICE_PORT: 8006
    command: ["python", "-m", "uvicorn", "services.oa_collaboration.app.main:app", "--host", "0.0.0.0", "--port", "8006"]
    ports:
      - "8006:8006"

  question-bank:
    <<: *service-base
    container_name: smartcampus-question-bank
    environment:
      <<: *service-base
      SERVICE_PORT: 8007
    command: ["python", "-m", "uvicorn", "services.question_bank.app.main:app", "--host", "0.0.0.0", "--port", "8007"]
