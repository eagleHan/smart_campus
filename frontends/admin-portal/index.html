<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧校园统一管理后台</title>
  <style>
    :root {
      --bg: #f3efe6;
      --panel: rgba(255, 252, 246, 0.88);
      --ink: #1d2a32;
      --subtle: #6c7b84;
      --line: rgba(29, 42, 50, 0.12);
      --accent: #bf5b2c;
      --accent-soft: #f4c89d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(191, 91, 44, 0.18), transparent 28%),
        linear-gradient(135deg, #f6f2ea 0%, #e4ece8 100%);
      min-height: 100vh;
    }
    .shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      padding: 32px 24px;
      border-right: 1px solid var(--line);
      background: rgba(255, 248, 239, 0.72);
      backdrop-filter: blur(14px);
    }
    .brand {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--subtle);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .menu-item {
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.45);
    }
    .content {
      padding: 32px;
    }
    .hero {
      padding: 28px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 20px 60px rgba(29, 42, 50, 0.08);
    }
    .hero h1 { margin: 0 0 12px; font-size: 34px; }
    .hero p { margin: 0; color: var(--subtle); line-height: 1.7; max-width: 720px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 22px;
    }
    .card {
      padding: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
    }
    .metric {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">Campus Console</div>
      <div class="subtitle">统一管理后台聚合身份、组织、教务、考试与办公系统的治理入口。</div>
      <div class="menu-item">租户与学校</div>
      <div class="menu-item">账号与权限</div>
      <div class="menu-item">服务治理</div>
      <div class="menu-item">开放接口</div>
      <div class="menu-item">审计与配置</div>
    </aside>
    <main class="content">
      <section class="hero">
        <h1>统一后台，独立服务</h1>
        <p>每个业务服务保留独立前端与独立后端部署能力，统一管理后台只负责平台级治理、菜单编排、租户配置与运行态监控，不侵入业务域数据所有权。</p>
      </section>
      <section class="grid">
        <article class="card"><div class="metric">9</div><div>核心业务微服务</div></article>
        <article class="card"><div class="metric">9</div><div>独立业务前端</div></article>
        <article class="card"><div class="metric">1</div><div>统一管理后台</div></article>
        <article class="card"><div class="metric">3</div><div>基础中间件</div></article>
      </section>
    </main>
  </div>
</body>
</html>
