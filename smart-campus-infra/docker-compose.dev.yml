version: '3.8'

# 本地开发环境：只启动依赖中间件，后端/前端在本地 IDE 运行
services:
  mysql:
    image: mysql:8.0
    container_name: campus-dev-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: campus@Root123
      MYSQL_DATABASE: campus
      MYSQL_USER: campus
      MYSQL_PASSWORD: campus@123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: campus-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  minio:
    image: minio/minio:latest
    container_name: campus-dev-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: campus-minio
      MINIO_ROOT_PASSWORD: campus@MinIO123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data
    command: server /data --console-address ":9001"

volumes:
  mysql_dev_data:
  redis_dev_data:
  minio_dev_data:
